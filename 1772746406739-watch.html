0.  It also won the Brit Award for Best single in 1988. Stock Aitken and Waterman wrote and produced the track which was the lead-off single and lead track from Rick’s debut LP “Whenever You Need Somebody”.  The album was itself a UK number one and would go on to sell over 15 million copies worldwide.\\n\\nThe legendary video was directed by Simon West – who later went on to make Hollywood blockbusters such as Con Air, Lara Croft – Tomb Raider and The Expendables 2.  The video passed the 1bn YouTube views milestone on 28 July 2021.\\n\\nSubscribe to the official Rick Astley YouTube channel: https:\/\/RickAstley.lnk...\\n\\nFollow Rick Astley:\\nFacebook: https:\/\/RickAstley.lnk... \\nTwitter: https:\/\/RickAstley.lnk... \\nInstagram: https:\/\/RickAstley.lnk... \\nWebsite: https:\/\/RickAstley.lnk... \\nTikTok: https:\/\/RickAstley.lnk...\\n\\nListen to Rick Astley:\\nSpotify: https:\/\/RickAstley.lnk... \\nApple Music: https:\/\/RickAstley.lnk... \\nAmazon Music: https:\/\/RickAstley.lnk... \\nDeezer: https:\/\/RickAstley.lnk... \\n\\nLyrics:\\nWe’re no strangers to love\\nYou know the rules and so do I\\nA full commitment’s what I’m thinking of\\nYou wouldn’t get this from any other guy\\n\\nI just wanna tell you how I’m feeling\\nGotta make you understand\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\nWe’ve known each other for so long\\nYour heart’s been aching but you’re too shy to say it\\nInside we both know what’s been going on\\nWe know the game and we’re gonna play it\\n\\nAnd if you ask me how I’m feeling\\nDon’t tell me you’re too blind to see\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\n#RickAstley #NeverGonnaGiveYouUp #WheneverYouNeedSomebody #OfficialMusicVideo\x2 lnk... \\nAmazon Music: https:\/\/RickAstley.lnk... \\nDeezer: https:\/\/RickAstley.lnk... \\n\\nLyrics:\\nWe’re no strangers to love\\nYou know the rules and so do I\\nA full commitment’s what I’m thinking of\\nYou wouldn’t get this from any other guy\\n\\nI just wanna tell you how I’m feeling\\nGotta make you understand\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\nWe’ve known each other for so long\\nYour heart’s been aching but you’re too shy to say it\\nInside we both know what’s been going on\\nWe know the game and we’re gonna play it\\n\\nAnd if you ask me how I’m feeling\\nDon’t tell me you’re too blind to see\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\n#RickAstley #NeverGonnaGiveYouUp #WheneverYouNeedSomebody #OfficialMusicVideo\x22,\x22commandRuns\x22:\x5b\x7b\x22startIndex\x22:180,\x22length\x22:16,\x22onTap\x22:\x7b\x22innertubeCommand\x22:\x7b\x22clickTrackingParams\x22:\x22CHYQ3NcEGCUiEwjoxc_-2omTAxWIRUIHHaQ5BP7KAQTGr8oM\x22,\x22commandMetadata\x22:\x7b\x22webCommandMetadata\x22:\x7b\x22url\x22:\x22\/hashtag\/rickastleynever\x22,\x22webPageType\x22:\x22WEB_PAGE_TYPE_BROWSE\x22,\x22rootVe\x22:6827,\x22apiUrl\x22:\x22\/youtubei\/v1\/browse\x22\x7d\x7d,\x22browseEndpoint\x22:\x7b\x22browseId\x22:\x22FEhashtag\x22,\x22params\x22:\x226gUTCg9yaWNrYXN0bGV5bmV2ZXIYAQ%3D%3D\x22\x7d\x7d\x7d,\x22loggingDirectives\x22:\x7b\x22trackingParams\x22:\x22CHYQ3NcEGCUiEwjoxc_-2omTAxWIRUIHHaQ5BP4\x3d\x22\x7d\x7d,\x7b\x22startIndex\x22:197,\x22length\x22:25,\x22onTap\x22:\x7b\x22innertubeCommand\x22:\x7b\x22clickTrackingParams\x22:\x22CAYQ040EGAIiEwjoxc_-2omTAxWIRUIHHaQ5BP5IxLuBrb2YjoZ1ygEExq_KDA\x3d\x3d\x22,\x22commandMetadata\x22:\x7b\x22webCommandMetadata\x22:\x7b\x22url\x22:\x22htt
