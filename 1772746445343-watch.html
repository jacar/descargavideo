ionBodyText\x22:\x7b\x22content\x22:\x22The official video for “Never Gonna Give You Up” by Rick Astley. \\n\\nNever: The Autobiography 📚 OUT NOW! \\nFollow this link to get your copy and listen to Rick’s ‘Never’ playlist ❤️ #RickAstleyNever\\nhttps:\/\/linktr.ee\/rick...\\n\\n“Never Gonna Give You Up” was a global smash on its release in July 1987, topping the charts in 25 countries including Rick’s native UK and the US Billboard Hot 100.  It also won the Brit Award for Best single in 1988. Stock Aitken and Waterman wrote and produced the track which was the lead-off single and lead track from Rick’s debut LP “Whenever You Need Somebody”.  The album was itself a UK number one and would go on to sell over 15 million copies worldwide.\\n\\nThe legendary video was directed by Simon West – who later went on to make Hollywood blockbusters such as Con Air, Lara Croft – Tomb Raider and The Expendables 2.  The video passed the 1bn YouTube views milestone on 28 July 2021.\\n\\nSubscribe to the official Rick Astley YouTube channel: https:\/\/RickAstley.lnk...\\n\\nFollow Rick Astley:\\nFacebook: https:\/\/RickAstley.lnk... \\nTwitter: https:\/\/RickAstley.lnk... \\nInstagram: https:\/\/RickAstley.lnk... \\nWebsite: https:\/\/RickAstley.lnk... \\nTikTok: https:\/\/RickAstley.lnk...\\n\\nListen to Rick Astley:\\nSpotify: https:\/\/RickAstley.lnk... \\nApple Music: https:\/\/RickAstley.lnk... \\nAmazon Music: https:\/\/RickAstley.lnk... \\nDeezer: https:\/\/RickAstley.lnk... \\n\\nLyrics:\\nWe’re no strangers to love\\nYou know the rules and so do I\\nA full commitment’s what I’m thinking of\\nYou wouldn’t get this from any other guy\\n\\nI just wanna tell you how I’m feeling\\nGotta make you understand\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\nWe’ve known each other for so long\\nYour heart’s been aching but you’re too shy to say it\\nInside we both know what’s been going on\\nWe know the game and we’re gonna play it\\n\\nAnd if you ask me how I’m feeling\\nDon’t tell me you’re too blind to see\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\n#RickAstley #NeverGonnaGiveYouUp #WheneverYouNeedSomebody #OfficialMusicVideo\x22,\x22commandRuns\x22:\x5b\x7b\x22startIndex\x22:180,\x22length\x22:16,\x22onTap\x22:\x7b\x22innertubeCommand\x22:\x7b\x22clickTrackingParams\x22:\x22CHsQ3NcEGFUiEwisr_qQ24mTAxXZgq4FHdCODuHKAQTGr8oM\x22,\x22commandMetadata\x22:\x7b\x22webCommandMetadata\x22:\x7b\x22url\x22:\x22\/hashtag\/rickastleynever\x22,\x22webPageType\x22:\x22WEB_PAGE_TYPE_BROWSE\x22,\x22rootVe\x22:6827,\x22apiUrl\x22:\x22\/youtubei\/v1\/browse\x22\x7d\x7d,\x22browseEndpoint\x22:\x7b\x22browseId\x22:\x22FEhashtag\x22,\x22params\x22:\x226gUTCg9yaWNrYXN0bGV5bmV2ZXIYAQ%3D%3D\x22\x7d\x7d\x7d,\x22loggingDirectives\x22:\x7b\x22trackingParams\x22:\x22CHsQ3NcEGFUiEwisr_qQ24mTAxXZgq4FHdCODuE\x3d\x22\x7d\x7d,\x7b\x22startIndex\x22:197,\x22length\x22:25,\x22onTap\x22:\x7b\x22innertubeCommand\x22:\x7b\x22clickTrackingParams\x22:\x22CAYQ040EGAIiEwisr_qQ24mTAxXZgq4FHdCODuFIxLuBrb2YjoZ1ygEExq_KDA\x3d\x3d\x22,\x22commandMetadata\x22:\x7b\x22webCommandMetadata\x22:\x7b\x22url\x22:\x22https:\/\/www.youtube.com\/redirect?event\x3dvideo_description\\u0026redir_token\x3dQUFFLUhqbHI2WmcyYlpkMm1EMG9sZU9xQ2FuNG9wWHc2d3xBQ3Jtc0trbzNGQi1MU0xvZ1ctSUtrZ0RZc0NaeFJDUWM4MFRYa1BYaS1sSkJvYldNelpwRWJFVnFVbTAyS3B6UnR1YnNqSktOQ3N1TE04X1JaeW1CVlZ3czhTQXV3cTJ1aU44ZzZHQ013SFlzTE1HOVNiM1RYdw\\u0026q\x3dhttps%3A%2F%2Flinktr.ee%2Frickastleynever\\u0026v\x3ddQw4w9WgXcQ\x22,\x22webPageType\x22:\x22WEB_PAGE_TYPE_UNKNOWN\x22,\x22rootVe\x22:83769\x7d\x7d,\x22urlEndpoint\x22:\x7b\x22url\x22:\x22https:\/\/www.youtube.com\/redirect?event\x3dvideo_description\\u0026redir_token\x3dQUFFLUhqbHI2WmcyYlpkMm1EMG9sZU9x stone on 28 July 2021.\\n\\nSubscribe to the official Rick Astley YouTube channel: https:\/\/RickAstley.lnk...\\n\\nFollow Rick Astley:\\nFacebook: https:\/\/RickAstley.lnk... \\nTwitter: https:\/\/RickAstley.lnk... \\nInstagram: https:\/\/RickAstley.lnk... \\nWebsite: https:\/\/RickAstley.lnk... \\nTikTok: https:\/\/RickAstley.lnk...\\n\\nListen to Rick Astley:\\nSpotify: https:\/\/RickAstley.lnk... \\nApple Music: https:\/\/RickAstley.lnk... \\nAmazon Music: https:\/\/RickAstley.lnk... \\nDeezer: https:\/\/RickAstley.lnk... \\n\\nLyrics:\\nWe’re no strangers to love\\nYou know the rules and so do I\\nA full commitment’s what I’m thinking of\\nYou wouldn’t get this from any other guy\\n\\nI just wanna tell you how I’m feeling\\nGotta make you understand\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\nWe’ve known each other for so long\\nYour heart’s been aching but you’re too shy to say it\\nInside we both know what’s been going on\\nWe know the game and we’re gonna play it\\n\\nAnd if you ask me how I’m feeling\\nDon’t tell me you’re too blind to see\\n\\nNever gonna give you up\\nNever gonna let you down\\nNever gonna run around and desert you\\nNever gonna make you cry\\nNever gonna say goodbye\\nNever gonna tell a lie and hurt you\\n\\n#RickAstley #NeverGonnaGiveYouUp #WheneverYouNeedSomebody #OfficialMusicVideo\x22,\x22commandRuns\x22:\x5b\x7b\x22startIndex\x22:180,\x22length\x22:16,\x22onTap\x22:\x7b\x22innertubeCommand\x22:\x7b\x22clickTrackingParams\x22:\x22CHYQ3NcEGCUiEwisr_qQ24mTAxXZgq4FHdCODuHKAQTGr8oM\x22,\x22commandMetadata\x22:\x7b\x22webCommandMetadata\x22:\x7b\x22url\x22:\x22\/hashtag\/rickastleynever\x22,\x22webPageType\x22:\x22WEB_PAGE_TYPE_BROWSE\x22,\x22rootVe\x22:6827,\x22apiUrl\x22:\x22\/youtubei\/v1\/browse\x22\x7d\x7d,\x22browseEndpoint\x22:\x7b\x22browseId\x22:\x22FEhashtag\x22,\x22params\x22:\x226g “Never Gonna Give You Up” was a global smash on its release in July 1987, topping the charts in 25 countries including Rick’s native UK and the US Billboard Hot 100.  It also won the Brit Award for Best single in 1988. Stock Aitken and Waterman wrote and produced the track which was the lead-off single and lead track from Rick’s debut LP “Whenever You Need Somebody”.  The album was itself a UK number one and would go on to sell over 15 million copies worldwide.

The legendary video was directed by Simon West – who later went on to make Hollywood blockbusters such as Con Air, Lara Croft – Tomb Raider and The Expendables 2.  The video passed the 1bn YouTube views milestone on 28 July 2021.
